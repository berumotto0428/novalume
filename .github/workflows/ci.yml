name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set test env
        run: |
          echo "LLM_API_KEY=test" >> .env.ci
          echo "LLM_BASE_URL=https://api.deepseek.com/v1" >> .env.ci
          echo "LLM_MODEL=deepseek-chat" >> .env.ci
          echo "EMBEDDING_API_KEY=test" >> .env.ci
          echo "EMBEDDING_BASE_URL=https://open.bigmodel.cn/api/paas/v4" >> .env.ci
          echo "EMBEDDING_MODEL=embedding-3" >> .env.ci
          echo "JWT_SECRET_KEY=test" >> .env.ci
          echo "CORS_ORIGINS=[\"http://localhost:5173\"]" >> .env.ci

      - name: Check imports
        run: |
          mv .env.ci .env
          python -c "import config; import database; import main; print('Backend OK')"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Check if code changed
        id: check
        run: |
          # 首次 push 或 tag push → 总是构建
          if [ "${{ github.ref_type }}" = "tag" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            changed=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- backend/ frontend/ 2>/dev/null)
            if [ -n "$changed" ]; then
              echo "build=true" >> $GITHUB_OUTPUT
            else
              echo "build=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Login to DockerHub
        if: steps.check.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        if: steps.check.outputs.build == 'true'
        run: |
          # 构建
          docker build -t berumotto0428/novalume:backend-latest backend
          docker build -t berumotto0428/novalume:frontend-latest frontend
          # 推送 latest
          docker push berumotto0428/novalume:backend-latest
          docker push berumotto0428/novalume:frontend-latest
          # 如果是 git tag 推送，额外推版本标签
          if [ "${{ github.ref_type }}" = "tag" ]; then
            docker tag berumotto0428/novalume:backend-latest berumotto0428/novalume:backend-${{ github.ref_name }}
            docker tag berumotto0428/novalume:frontend-latest berumotto0428/novalume:frontend-${{ github.ref_name }}
            docker push berumotto0428/novalume:backend-${{ github.ref_name }}
            docker push berumotto0428/novalume:frontend-${{ github.ref_name }}
          fi
