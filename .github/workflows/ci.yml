name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set test env
        run: |
          echo "LLM_API_KEY=test" >> .env.ci
          echo "LLM_BASE_URL=https://api.deepseek.com/v1" >> .env.ci
          echo "LLM_MODEL=deepseek-chat" >> .env.ci
          echo "EMBEDDING_API_KEY=test" >> .env.ci
          echo "EMBEDDING_BASE_URL=https://open.bigmodel.cn/api/paas/v4" >> .env.ci
          echo "EMBEDDING_MODEL=embedding-3" >> .env.ci
          echo "JWT_SECRET_KEY=test" >> .env.ci
          echo "CORS_ORIGINS=[\"http://localhost:5173\"]" >> .env.ci

      - name: Check imports
        run: |
          mv .env.ci .env
          python -c "import config; import database; import main; print('Backend OK')"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/novalume:backend-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/novalume:backend-${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/novalume:frontend-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/novalume:frontend-${{ github.sha }}
