services:
  backend:
    image: berumotto0428/novalume:backend-latest
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: berumotto0428/novalume:frontend-latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
